[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

# Monad testnet. Override the RPC/chain id if the endpoint changes.
[rpc_endpoints]
monad_testnet = "${MONAD_RPC}"

[etherscan]
# Monad explorer verification (fill in when available).
monad_testnet = { key = "${EXPLORER_API_KEY}", url = "${EXPLORER_API_URL}" }
